      <h1 id="Git-常见命令行"><a href="#Git-常见命令行" class="headerlink" title="Git 常见命令行"></a>Git 常见命令行</h1><p>新建仓库</p>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><code class="hljs plaintext">git init<br><br>git add .<br><br>git commit -m &#x27;init commit.&#x27;<br><br></code></pre></td></tr></table></figure>

<p>基于当前分支新建本地分支</p>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><code class="hljs plaintext">git checkout -b &lt;NEW_LOCAL_BRANCH_NAME&gt;<br></code></pre></td></tr></table></figure>

<p>链接远程仓库</p>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><code class="hljs plaintext">git remote add &lt;REMOTE_REPO_NAME&gt; &lt;REMOTE_REPO_URL&gt;<br></code></pre></td></tr></table></figure>

<p>推送到远端仓库</p>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><code class="hljs plaintext">git push &lt;REMOTE_REPO_NAME&gt; &lt;REMOTE_BRANCH&gt;<br></code></pre></td></tr></table></figure>

<p>删除仓库分支</p>
<figure class="highlight plaintext"><table><tr><td class="code"><pre><code class="hljs plaintext">git branch -d &lt;LOCAL_BRANCH_NAME&gt;<br><br>git push origin --delete &lt;REMOTE_BRANCH_NAME&gt;<br><br></code></pre></td></tr></table></figure>
