class="hljs-number">1</span>)) &#123;<br>            path += s.<span class="hljs-built_in">substr</span>(index, s.<span class="hljs-built_in">size</span>() - index);<br>            res.<span class="hljs-built_in">push_back</span>(path);<br>        &#125;<br>    &#125;<br>    <br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = index; i &lt; s.<span class="hljs-built_in">size</span>(); i++) &#123;<br>        <span class="hljs-keyword">if</span> (<span class="hljs-built_in">isIP</span>(s, index, i)) &#123;<br>            string origin = path;<br>            path = path + s.<span class="hljs-built_in">substr</span>(index, i - index + <span class="hljs-number">1</span>) + <span class="hljs-string">&#x27;.&#x27;</span>;<br>            count++;<br>            <span class="hljs-built_in">backtracking</span>(s, i + <span class="hljs-number">1</span>, count);<br>            count--;<br>            path = origin;    <br>        &#125;<br>    &#125;<br>&#125;<br><br><span class="hljs-function">vector&lt;string&gt; <span class="hljs-title">restoreIpAddresses</span><span class="hljs-params">(string s)</span> </span>&#123;<br>	<span class="hljs-built_in">backtracking</span>(s, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>);<br>	<span class="hljs-keyword">return</span> res;<br>&#125;<br></code></pre></td></tr></table></figure>
