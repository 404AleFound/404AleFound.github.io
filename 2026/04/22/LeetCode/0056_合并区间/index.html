<p><strong>题解</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp">vector&lt;vector&lt;<span class="hljs-type">int</span>&gt;&gt; <span class="hljs-built_in">merge</span>(vector&lt;vector&lt;<span class="hljs-type">int</span>&gt;&gt;&amp; intervals) &#123;<br>    vector&lt;vector&lt;<span class="hljs-type">int</span>&gt;&gt; res;<br>    <span class="hljs-keyword">if</span> (intervals.<span class="hljs-built_in">empty</span>()) <span class="hljs-keyword">return</span> res;<br>    <span class="hljs-type">int</span> n = intervals.<span class="hljs-built_in">size</span>();<br>    <br>    <span class="hljs-built_in">sort</span>(intervals.<span class="hljs-built_in">begin</span>(), intervals.<span class="hljs-built_in">end</span>(), <br>         [](<span class="hljs-type">const</span> vector&lt;<span class="hljs-type">int</span>&gt;&amp; a, <span class="hljs-type">const</span> vector&lt;<span class="hljs-type">int</span>&gt;&amp; b) &#123;<span class="hljs-keyword">return</span> a[<span class="hljs-number">0</span>] &lt; b[<span class="hljs-number">0</span>];&#125;);<br>    <br>    res.<span class="hljs-built_in">push_back</span>(intervals[<span class="hljs-number">0</span>]);<br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">1</span>; i &lt; n; i++) &#123;<br>        <span class="hljs-keyword">if</span> (intervals[i][<span class="hljs-number">0</span>] &gt; res.<span class="hljs-built_in">back</span>()[<span class="hljs-number">1</span>]) &#123;<br>            res.<span class="hljs-built_in">push_back</span>(intervals[i]);<br>        &#125; <span class="hljs-keyword">else</span> &#123;<br>            res.<span class="hljs-built_in">back</span>()[<span class="hljs-number">1</span>] = <span class="hljs-built_in">max</span>(res.<span class="hljs-built_in">back</span>()[<span class="hljs-number">1</span>], intervals[i][<span class="hljs-number">1</span>]);<br>        &#125;<br>    &#125;<br>    <span class="hljs-keyword">return</span> res;<br>&#125;<br></code></pre></td></tr></table></figure>

<p><strong>易错点</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-comment">// res.back() 的括号不要遗漏</span><br><br><span class="hljs-comment">// 判断是否相交，即判断下一个区间的左边界和上一个区间的右边界的大小</span><br><br><span class="hljs-comment">// 合并的方式，若两个区间相交，右边界取两个区间的大值。</span><br></code></pre></td></tr></table></figure>
