<p><strong>题目</strong></p>
<p>给你一个 <code>m</code> 行 <code>n</code> 列的矩阵 <code>matrix</code> ，请按照顺时针螺旋顺序，返回矩阵中的所有元素。</p>
<p><strong>题解</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-function">vector&lt;<span class="hljs-type">int</span>&gt; <span class="hljs-title">spiralOrder</span><span class="hljs-params">(vector&lt;vector&lt;<span class="hljs-type">int</span>&gt;&gt;&amp; matrix)</span> </span>&#123;<br>    <span class="hljs-type">int</span> up = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">int</span> down = matrix.<span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>;<br>    <span class="hljs-type">int</span> left = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">int</span> right = matrix[<span class="hljs-number">0</span>].<span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>;<br>    vector&lt;<span class="hljs-type">int</span>&gt; res;<br>    <span class="hljs-keyword">while</span>(<span class="hljs-literal">true</span>) &#123;<br>        <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = left; i &lt;= right; i++) &#123;<br>            res.<span class="hljs-built_in">push_back</span>(matrix[up][i]);<br>        &#125;<br>        up++;<br>        <span class="hljs-keyword">if</span> (up &gt; down) <span class="hljs-keyword">break</span>;<br>        <br>        <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = up; i &lt;= down; i++) &#123;<br>            res.<span class="hljs-built_in">push_back</span>(matrix[i][right]);<br>        &#125;<br>        right--;<br>        <span class="hljs-keyword">if</span> (left &gt; right) <span class="hljs-keyword">break</span>;<br>        <br>        <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = right; i &gt;= left; i--) &#123;<br>            res.<span class="hljs-built_in">push_back</span>(matrix[down][i]);<br>        &#125;<br>        down--;<br>        <span class="hljs-keyword">if</span> (up &gt; down) <span class="hljs-keyword">break</span>;<br>        <br>        <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = down; i &gt;= up; i--) &#123;<br>            res.<span class="hljs-built_in">push_back</span>(matrix[i][left]);<br>        &#125;<br>        left++;<br>        <span class="hljs-keyword">if</span> (left &gt; right) <span class="hljs-keyword">break</span>;<br>    &#125;<br>    <span class="hljs-keyword">return</span> res;<br>&#125;<br></code></pre></td></tr></table></figure>
