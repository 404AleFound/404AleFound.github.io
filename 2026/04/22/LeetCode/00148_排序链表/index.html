<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-function">ListNode* <span class="hljs-title">getMidNode</span><span class="hljs-params">(ListNode* head)</span> </span>&#123;<br>    <span class="hljs-keyword">if</span> (!head) <span class="hljs-keyword">return</span> head;<br>    ListNode* dummyHead = <span class="hljs-keyword">new</span> <span class="hljs-built_in">ListNode</span>();<br>    dummyHead-&gt;next = head;<br>    ListNode* slow = dummyHead;<br>    ListNode* fast = dummyHead;<br>    <br>    <span class="hljs-keyword">while</span>(fast&amp;&amp; fast-&gt;next) &#123;<br>        slow = slow-&gt;next;<br>        fast = fast-&gt;next-&gt;next;<br>    &#125;<br>	ListNode* midNode = slow-&gt;next;<br>   	slow-&gt;next = <span class="hljs-literal">nullptr</span>;<br>    <span class="hljs-keyword">return</span> midNode;<br>&#125;<br><br><span class="hljs-function">ListNode* <span class="hljs-title">mergeTwoLists</span><span class="hljs-params">(ListNode* h1, ListNode* h2)</span> </span>&#123;<br>    ListNode* dummyHead = <span class="hljs-keyword">new</span> <span class="hljs-built_in">ListNode</span>();<br>    ListNode* curr = dummyHead;<br>    <span class="hljs-keyword">while</span>(h1 &amp;&amp; h2) &#123;<br>        <span class="hljs-keyword">if</span> (h1-&gt;val &lt; h2-&gt;val) &#123;<br>            curr-&gt;next = h1;<br>            h1 = h1-&gt;next;<br>        &#125; <span class="hljs-keyword">else</span> &#123;<br>            curr-&gt;next = h2;<br>            h2 = h2-&gt;next;<br>        &#125;<br>        curr = curr-&gt;next;<br>    &#125;<br>    <span class="hljs-keyword">if</span> (h1) curr-&gt;next = h1;<br>    <span class="hljs-keyword">if</span> (h2) curr-&gt;next = h2;<br>    <span class="hljs-keyword">return</span> dummyHead-&gt;next;<br>&#125;<br><br><span class="hljs-function">ListNode* <span class="hljs-title">sortList</span><span class="hljs-params">(ListNode* head)</span> </span>&#123;<br>    <span class="hljs-keyword">if</span> (!head || !head-&gt;next) <span class="hljs-keyword">return</span> head;<br>    ListNode* mid = <span class="hljs-built_in">getMidNode</span>(head);<br>    ListNode* h1 = <span class="hljs-built_in">sortList</span>(head);<br>    ListNode* h2 = <span class="hljs-built_in">sortList</span>(mid);<br>    <span class="hljs-keyword">return</span> <span class="hljs-built_in">mergeTwoLists</span>(h1, h2);<br>&#125;<br></code></pre></td></tr></table></figure>
