<p><strong>题目：</strong> <a target="_blank" rel="noopener" href="https://leetcode.cn/problems/lru-cache/description/">0146 LRU缓存机制</a></p>
<p><strong>题解：</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-keyword">struct</span> <span class="hljs-title class_">DLinkedNode</span> &#123;<br>    <span class="hljs-type">int</span> val, key;<br>    DLinkedNode* prev;<br>    DLinkedNode* next;<br>    <span class="hljs-built_in">DLinkedNode</span>() : <span class="hljs-built_in">val</span>(<span class="hljs-number">0</span>), <span class="hljs-built_in">key</span>(<span class="hljs-number">0</span>), <span class="hljs-built_in">prev</span>(<span class="hljs-literal">nullptr</span>), <span class="hljs-built_in">next</span>(<span class="hljs-literal">nullptr</span>) &#123;&#125;;<br>    <span class="hljs-built_in">DLinkedNode</span>(<span class="hljs-type">int</span> x, <span class="hljs-type">int</span> y) : <span class="hljs-built_in">key</span>(x), <span class="hljs-built_in">val</span>(y), <span class="hljs-built_in">prev</span>(<span class="hljs-literal">nullptr</span>), <span class="hljs-built_in">next</span>(<span class="hljs-literal">nullptr</span>) &#123;&#125;;<br>&#125;;<br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">LRUCache</span> &#123;<br><span class="hljs-keyword">private</span>:<br>    DLinkedNode* head_;<br>    DLinkedNode* tail_;<br>    unordered_map&lt;<span class="hljs-type">int</span>, DLinkedNode*&gt; cache_;<br>    <span class="hljs-type">int</span> size_;<br>    <span class="hljs-type">int</span> capacity_;<br><span class="hljs-keyword">private</span>:<br>    <span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">removeNode</span><span class="hljs-params">(DLinkedNode* node)</span> </span>&#123;<br>        node-&gt;next-&gt;prev = node-&gt;prev;<br>        node-&gt;prev-&gt;next = node-&gt;next;<br>    &#125;<br>    <br>    <span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">addToHead</span><span class="hljs-params">(DLinkedNode* node)</span> </span>&#123;<br>        node-&gt;next = head_-&gt;next;<br>        node-&gt;prev = head_;<br>        head_-&gt;next-&gt;prev = node;<br>        head_-&gt;next = node;<br>    &#125;<br>    <br>    <span class="hljs-function">DLinkedNode* <span class="hljs-title">removeTail</span><span class="hljs-params">()</span> </span>&#123;<br>        DLinkedNode* node = tail_-&gt;prev;<br>        <span class="hljs-built_in">removeNode</span>(node);<br>        <span class="hljs-keyword">return</span> node;<br>    &#125;<br><span class="hljs-keyword">public</span>:<br>    <span class="hljs-built_in">LRUCache</span>(<span class="hljs-type">int</span> capacity) &#123;<br>        head_ = <span class="hljs-keyword">new</span> <span class="hljs-built_in">DLinkedNode</span>();<br>        tail_ = <span class="hljs-keyword">new</span> <span class="hljs-built_in">DLinkedNode</span>();<br>        head_-&gt;next = tail_;<br>        tail_-&gt;prev = head_;<br>        capacity_ = capacity;<br>        size_ = <span class="hljs-number">0</span>;<br>    &#125;<br>    <br>    <span class="hljs-function"><span class="hljs-type">int</span> <span class="hljs-title">get</span><span class="hljs-params">(<span class="hljs-type">int</span> key)</span> </span>&#123;<br>        <span class="hljs-keyword">if</span> (<span class="hljs-built_in">cache_find</span>(key) != <span class="hljs-built_in">cache_end</span>()) &#123;<br>            DLinkedNode* node = cache_[key];<br>            <span class="hljs-built_in">removeNode</span>(node);<br>            <span class="hljs-built_in">addToHead</span>(node);<br>            <span class="hljs-keyword">return</span> node-&gt;val;<br>        &#125;<br>        <span class="hljs-keyword">return</span> <span class="hljs-number">-1</span>;<br>    &#125;<br>    <br>    <span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">put</span><span class="hljs-params">(<span class="hljs-type">int</span> key, <span class="hljs-type">int</span> value)</span> </span>&#123;<br>        <span class="hljs-keyword">if</span> (<span class="hljs-built_in">cache_find</span>(key) == <span class="hljs-built_in">cache_end</span>()) &#123;<br>            DLinkedNode* node = <span class="hljs-keyword">new</span> <span class="hljs-built_in">DLinkedNode</span>(key, value);<br>            cache_[key] = node;<br>            <span class="hljs-built_in">addToHead</span>(node);<br>            size_++;<br>            <span class="hljs-keyword">while</span> (size_ &gt; capacity_) &#123;<br>                DLinkedNode* node = <span class="hljs-built_in">removeTail</span>();<br>                <span class="hljs-built_in">cache_erase</span>(node-&gt;key);<br>                size_--;<br>            &#125;<br>        &#125; <span class="hljs-keyword">else</span> &#123;<br>            DLinkedNode* node = cache_[key];<br>            node-&gt;val = value;<br>            <span class="hljs-built_in">removeNode</span>(node);<br>            <span class="hljs-built_in">addToHead</span>(node);<br>        &#125;<br>    &#125;<br>&#125;;<br></code></pre></td></tr></table></figure>

<p><strong>易错点：</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-comment">// 1 在 put() 中不要忘了更新 cache_</span><br><span class="hljs-comment">// 11 在 cache_ 中不存在</span><br>cache_[key] = value; <br><span class="hljs-comment">// 12 在 cache_ 中存在</span><br>DLinkedNode* node = cache_[key];<br>node-&gt;val = value; <br><br><span class="hljs-comment">// 2 RemoveTail() 移除的是 tail_-&gt;prev;</span><br><span class="hljs-built_in">removeNode</span>(tail_-&gt;prev);<br></code></pre></td></tr></table></figure>
