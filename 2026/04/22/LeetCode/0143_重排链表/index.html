<p><strong>题解</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-function">ListNode* <span class="hljs-title">getMidNode</span><span class="hljs-params">(ListNode* head)</span> </span>&#123;<br>    ListNode* fast = head;<br>    ListNode* slow = head;<br>    <span class="hljs-keyword">while</span> (fast-&gt;next &amp;&amp; fast-&gt;next-&gt;next) &#123;<br>        fast = fast-&gt;next-&gt;next;<br>        slow = slow-&gt;next;<br>    &#125;<br>    <span class="hljs-keyword">return</span> slow;<br>&#125;<br><br><span class="hljs-function">ListNode* <span class="hljs-title">reverseLinkedList</span><span class="hljs-params">(ListNode* head)</span> </span>&#123;<br>    ListNode* prev = <span class="hljs-literal">nullptr</span>;<br>    ListNode* curr = head;<br>    <span class="hljs-keyword">while</span> (curr) &#123;<br>        ListNode* next = curr-&gt;next;<br>        curr-&gt;next = prev;<br>        prev = curr;<br>        curr = next;<br>    &#125;<br>    <span class="hljs-keyword">return</span> prev;<br>&#125;<br><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">mergeLinkedList</span><span class="hljs-params">(ListNode* h1, ListNode* h2)</span> </span>&#123;<br>    <span class="hljs-keyword">while</span>(h1 &amp;&amp; h2) &#123;<br>      	ListNode* next1 = h1-&gt;next;<br>        ListNode* next2 = h2-&gt;next;<br>        <br>        h1-&gt;next = h2;<br>        h1 = next1;<br>        h2-&gt;next = h1;<br>        h2 = next2;<br>    &#125;<br>&#125;<br><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">reorderList</span><span class="hljs-params">(ListNode* head)</span> </span>&#123;<br>    ListNode* mid = <span class="hljs-built_in">getMidNode</span>(head);<br>    ListNode* head_ = <span class="hljs-built_in">reverseLinkedList</span>(mid-&gt;next);<br>    mid-&gt;next = <span class="hljs-literal">nullptr</span>;<br>    <span class="hljs-built_in">mergeLinkedList</span>(head, head_);<br>&#125;<br><br></code></pre></td></tr></table></figure>
