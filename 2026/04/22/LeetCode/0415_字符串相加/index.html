<p><strong>题解</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-function">string <span class="hljs-title">addStrings</span><span class="hljs-params">(string num1, string num2)</span> </span>&#123;<br>    <span class="hljs-type">int</span> p1 = num<span class="hljs-number">1.</span><span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>;<br>    <span class="hljs-type">int</span> p2 = num<span class="hljs-number">2.</span><span class="hljs-built_in">size</span>() - <span class="hljs-number">1</span>;<br>    <span class="hljs-type">int</span> add = <span class="hljs-number">0</span>;<br>    string res;<br>    <span class="hljs-keyword">while</span> (p1 &gt;= <span class="hljs-number">0</span> || p2 &gt;= <span class="hljs-number">0</span> || add &gt; <span class="hljs-number">0</span>) &#123;<br>        <span class="hljs-type">int</span> sum = <span class="hljs-number">0</span>;<br>        <span class="hljs-keyword">if</span> (p1 &gt;= <span class="hljs-number">0</span>) &#123;<br>            sum += num1[p1] - <span class="hljs-string">&#x27;0&#x27;</span>;<br>            p1--;<br>        &#125;<br>        <span class="hljs-keyword">if</span> (p2 &gt;= <span class="hljs-number">0</span>) &#123;<br>            sum += num2[p2] - <span class="hljs-string">&#x27;0&#x27;</span>;<br>            p2--;<br>        &#125;<br>        <br>        sum += add;<br>        add = sum / <span class="hljs-number">10</span>;<br>        sum = sum % <span class="hljs-number">10</span>;<br>        res.<span class="hljs-built_in">push_back</span>(sum + <span class="hljs-string">&#x27;0&#x27;</span>);<br>    &#125;<br>    <span class="hljs-built_in">reverse</span>(res.<span class="hljs-built_in">begin</span>(), res.<span class="hljs-built_in">end</span>());<br>    <span class="hljs-keyword">return</span> res;<br>&#125;<br></code></pre></td></tr></table></figure>

<p><strong>易错点</strong></p>
