      <p>摘要：链表经典题目，考察指针操作与链表遍历技巧，是面试高频题型。</p>
<span id="more"></span>


<div class="markdown-alert markdown-alert-note">

<p><strong>题目：</strong> <a target="_blank" rel="noopener" href="https://leetcode.cn/problems/reverse-nodes-in-k-group/description/">0025 K个一组反转链表</a></p>
<p><strong>题解：</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">reverseMyGroup</span><span class="hljs-params">(ListNode* preHead, ListNode* tail)</span> </span>&#123;<br>    ListNode* myHead = preHead-&gt;next;<br>    ListNode* curr = myHead-&gt;next;<br>    ListNode* nextTail = tail-&gt;next;<br>    <span class="hljs-keyword">while</span>(curr != nextTail) &#123;<br>        myHead-&gt;next = curr-&gt;next;<br>        curr-&gt;next = preHead-&gt;next;<br>        preHead-&gt;next = curr;<br>        curr = myHead-&gt;next;<br>    &#125;<br>&#125;<br><br><span class="hljs-function">ListNode* <span class="hljs-title">skipKNodes</span><span class="hljs-params">(ListNode* head, <span class="hljs-type">int</span> k)</span> </span>&#123;<br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">0</span>; i &lt; k; i++) &#123;<br>        <span class="hljs-keyword">if</span> (!head) <span class="hljs-keyword">return</span> head;<br>        head = head-&gt;next;<br>    &#125;<br>    <span class="hljs-keyword">return</span> head;<br>&#125;<br><br><span class="hljs-function">ListNode* <span class="hljs-title">reverseKGroup</span><span class="hljs-params">(ListNode* head, <span class="hljs-type">int</span> k)</span> </span>&#123;<br>    ListNode* dummyHead = <span class="hljs-keyword">new</span> <span class="hljs-built_in">ListNode</span>();<br>    dummyHead-&gt;next = head;<br>    ListNode* curr = dummyHead;<br>    ListNode* tail = <span class="hljs-built_in">skipKNodes</span>(curr, k);<br>    <span class="hljs-keyword">while</span> (tail) &#123;<br>        <span class="hljs-built_in">reverseMyGroup</span>(curr, tail);<br>        curr = <span class="hljs-built_in">skipKNodes</span>(curr, k);<br>        tail = <span class="hljs-built_in">skipKNodes</span>(curr, k);<br>    &#125;<br>    <span class="hljs-keyword">return</span> dummyHead-&gt;next;<br>&#125;<br></code></pre></td></tr></table></figure>

<p><strong>易错点：</strong></p>
<figure class="highlight cpp"><table><tr><td class="code"><pre><code class="hljs cpp"><span class="hljs-comment">// 1 reverseMyGroup() 中传参的 tail 指针的位置是在发生变化的，故因当在 while 循环前记录其后驱指针：</span><br>ListNode* nextTail = tail-&gt;next;<br><br><span class="hljs-comment">// 2 跳跃区间时的函数写法：</span><br>curr = <span class="hljs-built_in">skipKNodes</span>(curr, k);<br>tail = <span class="hljs-built_in">skipKNodes</span>(curr, k); <span class="hljs-comment">// 不是 tail = skipKNodes(tail, k)，因此 tail 此时已经在区间头了</span><br><br><span class="hljs-comment">// 3 skipKNodes() 函数内部判断是否返回 nullptr 的条件</span><br><span class="hljs-keyword">if</span> (!head) <span class="hljs-keyword">return</span> head; <span class="hljs-comment">// 不是 if (!head-&gt;next)</span><br></code></pre></td></tr></table></figure>
